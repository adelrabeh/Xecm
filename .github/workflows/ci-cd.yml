name: DARAH ECM — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: './src/Darah.ECM.sln'

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: BUILD & TEST
  # ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }}
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --no-restore

      - name: Run unit tests
        run: |
          dotnet test tests/Darah.ECM.UnitTests/Darah.ECM.UnitTests.csproj \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --no-build \
            --logger trx \
            --results-directory ./test-results \
            --collect:"XPlat Code Coverage"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: './test-results/*.trx'
          reporter: dotnet-trx

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./test-results/**/coverage.cobertura.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────
  # JOB 2: SECURITY SCAN
  # ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install security scanner
        run: dotnet tool install --global security-scan

      - name: Run dependency vulnerability check
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt

      - name: Fail if critical vulnerabilities found
        run: |
          if grep -q "Critical" vuln-report.txt; then
            echo "Critical vulnerabilities found!"
            cat vuln-report.txt
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # JOB 3: PUBLISH ARTIFACTS
  # ─────────────────────────────────────────────────────────────
  publish:
    name: Publish Artifacts
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Publish API
        run: |
          dotnet publish src/Darah.ECM.API/Darah.ECM.API.csproj \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --output ./publish/api \
            --no-restore

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecm-api-${{ github.sha }}
          path: ./publish/api
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # JOB 4: DEPLOY TO TEST ENVIRONMENT
  # ─────────────────────────────────────────────────────────────
  deploy-test:
    name: Deploy to TEST
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/develop'
    environment: test

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ecm-api-${{ github.sha }}
          path: ./publish/api

      - name: Deploy to TEST server (IIS via WebDeploy)
        run: |
          echo "Deploying to TEST environment..."
          # msdeploy -verb:sync -source:package=api.zip -dest:auto,computerName=${{ secrets.TEST_SERVER }},username=${{ secrets.TEST_USER }},password=${{ secrets.TEST_PASS }}
          echo "Deployment complete. Version: ${{ github.sha }}"

      - name: Health check after deploy
        run: |
          sleep 15
          curl -f https://ecm-test.darah.gov.sa/health || exit 1

  # ─────────────────────────────────────────────────────────────
  # JOB 5: DEPLOY TO PRODUCTION
  # ─────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to PRODUCTION
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main'
    environment: production     # Requires manual approval in GitHub

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ecm-api-${{ github.sha }}
          path: ./publish/api

      - name: Create deployment record
        run: |
          echo "Deploying version ${{ github.sha }} to PRODUCTION"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Deploy to PRODUCTION (Blue-Green)
        run: |
          echo "Deploying to PRODUCTION (Blue-Green)..."
          # Switch traffic after successful health check
          echo "Production deployment complete."

      - name: Production health check
        run: |
          sleep 30
          curl -f https://ecm.darah.gov.sa/health || exit 1

      - name: Notify on success
        if: success()
        run: |
          echo "Production deployment successful: ${{ github.sha }}"
          # Send Teams/Slack notification

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — initiating rollback..."
          # msdeploy rollback command
