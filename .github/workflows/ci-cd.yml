name: DARAH ECM — Hardened CI/CD

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: Release

jobs:
  build-and-test:
    name: Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '${{ env.DOTNET_VERSION }}' }
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
      - run: dotnet restore
      - run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore
      - name: Unit Tests
        run: |
          dotnet test tests/Darah.ECM.UnitTests/ \
            --configuration ${{ env.BUILD_CONFIGURATION }} --no-build \
            --logger trx --results-directory ./test-results/unit \
            --collect:"XPlat Code Coverage"
      - name: Integration Tests
        run: |
          dotnet test tests/Darah.ECM.IntegrationTests/ \
            --configuration ${{ env.BUILD_CONFIGURATION }} --no-build \
            --logger trx --results-directory ./test-results/integration
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: './test-results/**/*.trx'
          reporter: dotnet-trx
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./test-results/**/*.cobertura.xml
          fail_ci_if_error: false

  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '${{ env.DOTNET_VERSION }}' }
      - run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }}
      - uses: github/codeql-action/analyze@v3
        with: { category: "/language:csharp" }

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '${{ env.DOTNET_VERSION }}' }
      - run: dotnet restore
      - name: Check vulnerabilities
        id: vuln
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "Critical\|High" vuln-report.txt; then
            echo "FOUND=true" >> $GITHUB_OUTPUT
            echo "::error::Critical/High vulnerabilities detected!" && cat vuln-report.txt
          else
            echo "FOUND=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vuln-report
          path: vuln-report.txt
      - name: Block on critical
        if: steps.vuln.outputs.FOUND == 'true'
        run: exit 1

  validate-config:
    name: Config Security Validation
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: No secrets in config files
        run: |
          FOUND=0
          for f in $(find . -name "appsettings*.json" -not -path "*/bin/*" -not -path "*/obj/*"); do
            if grep -iE "(password|secret|key)\s*:\s*\"[A-Za-z0-9+/]{12,}" "$f" | grep -v "YOUR_\|CHANGE_\|PLACEHOLDER"; then
              echo "::error file=$f::Possible hardcoded secret!"; FOUND=1
            fi
          done
          exit $FOUND

  publish:
    name: Publish Artifact
    runs-on: ubuntu-latest
    needs: [build-and-test, sast, dependency-scan, validate-config]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '${{ env.DOTNET_VERSION }}' }
      - run: dotnet publish src/Darah.ECM.API/ -c ${{ env.BUILD_CONFIGURATION }} -o ./publish/api
      - name: Build manifest
        run: |
          echo "{\"build\":\"${{ github.run_id }}\",\"commit\":\"${{ github.sha }}\",\"branch\":\"${{ github.ref_name }}\"}" \
            > ./publish/api/build-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: ecm-api-${{ github.sha }}
          path: ./publish/api
          retention-days: 30

  deploy-test:
    name: Deploy → TEST
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/develop'
    environment:
      name: test
      url: https://ecm-test.darah.gov.sa/health
    steps:
      - uses: actions/download-artifact@v4
        with: { name: 'ecm-api-${{ github.sha }}', path: ./publish/api }
      - run: echo "Deploying ${{ github.sha }} to TEST"
      - name: Health check
        run: curl -f --retry 5 --retry-delay 10 https://ecm-test.darah.gov.sa/health || exit 1

  deploy-prod:
    name: Deploy → PRODUCTION
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://ecm.darah.gov.sa/health
    steps:
      - uses: actions/download-artifact@v4
        with: { name: 'ecm-api-${{ github.sha }}', path: ./publish/api }
      - run: |
          echo "=== PRODUCTION DEPLOYMENT ==="
          echo "Commit: ${{ github.sha }} | Actor: ${{ github.actor }}"
      - run: echo "Deploying to PRODUCTION..."
      - name: Production health check
        run: curl -f --retry 5 --retry-delay 15 https://ecm.darah.gov.sa/health || exit 1
      - name: Notify
        if: success()
        run: echo "::notice::PRODUCTION deployment successful — ${{ github.sha }}"
      - name: Rollback on failure
        if: failure()
        run: echo "::error::Deployment failed — initiating rollback..."
