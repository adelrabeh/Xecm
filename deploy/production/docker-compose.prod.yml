version: '3.9'

# DARAH ECM — Production Environment
# All secrets via environment variables — never hardcode values

services:

  api-blue:
    image: darah-ecm-api:${IMAGE_TAG:-latest}
    container_name: ecm-api-blue
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=darah.ecm.api
      - Jwt__Audience=darah.ecm.client
      - Jwt__ExpiryMinutes=15
      - Jwt__RefreshExpiryHours=8
      - Storage__Provider=LocalFileSystem
      - Storage__LocalPath=/app/ecm-storage
      - Email__SmtpHost=${SMTP_HOST}
      - Email__SmtpPort=${SMTP_PORT:-587}
      - Email__SmtpUsername=${SMTP_USERNAME}
      - Email__SmtpPassword=${SMTP_PASSWORD}
      - Email__FromAddress=ecm-noreply@darah.gov.sa
      - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD},ssl=False
      - Slot=Blue
    volumes:
      - ecm-storage:/app/ecm-storage
      - ecm-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks: [ecm-net]
    depends_on:
      sqlserver: { condition: service_healthy }
      redis:     { condition: service_healthy }
    deploy:
      resources:
        limits:        { cpus: '4', memory: 4G }
        reservations:  { cpus: '2', memory: 2G }

  api-green:
    image: darah-ecm-api:${IMAGE_TAG:-latest}
    container_name: ecm-api-green
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Storage__LocalPath=/app/ecm-storage
      - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD},ssl=False
      - Slot=Green
    volumes:
      - ecm-storage:/app/ecm-storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [ecm-net]
    profiles: [green]

  hangfire-worker:
    image: darah-ecm-api:${IMAGE_TAG:-latest}
    container_name: ecm-hangfire
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD},ssl=False
      - Storage__LocalPath=/app/ecm-storage
      - Email__SmtpHost=${SMTP_HOST}
      - Email__SmtpPort=${SMTP_PORT:-587}
      - Email__SmtpUsername=${SMTP_USERNAME}
      - Email__SmtpPassword=${SMTP_PASSWORD}
      - Hangfire__WorkerCount=8
    volumes:
      - ecm-storage:/app/ecm-storage
    networks: [ecm-net]
    depends_on:
      sqlserver: { condition: service_healthy }
      redis:     { condition: service_healthy }

  nginx:
    image: nginx:1.27-alpine
    container_name: ecm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl/darah.crt:/etc/nginx/ssl/darah.crt:ro
      - ./nginx/ssl/darah.key:/etc/nginx/ssl/darah.key:ro
      - ecm-logs:/var/log/nginx
    networks: [ecm-net, ecm-public]
    depends_on: [api-blue]

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecm-sqlserver
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_SA_PASSWORD}
      - MSSQL_PID=Enterprise
      - MSSQL_BACKUP_DIR=/var/opt/mssql/backup
      - MSSQL_AGENT_ENABLED=true
    volumes:
      - sqlserver-data:/var/opt/mssql/data
      - sqlserver-log:/var/opt/mssql/log
      - sqlserver-backup:/var/opt/mssql/backup
    ports:
      - "127.0.0.1:1433:1433"
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -b -o /dev/null
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks: [ecm-net]
    deploy:
      resources:
        limits:       { cpus: '8', memory: 16G }
        reservations: { cpus: '4', memory: 8G }

  redis:
    image: redis:7.4-alpine
    container_name: ecm-redis
    restart: unless-stopped
    command: >
      redis-server --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb --maxmemory-policy allkeys-lru
      --appendonly yes --appendfsync everysec
      --save 900 1 --save 300 10
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3
    networks: [ecm-net]

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ecm-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks: [ecm-net]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: ecm-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST}:${SMTP_PORT:-587}
      - GF_SMTP_USER=${SMTP_USERNAME}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=ecm-alerts@darah.gov.sa
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks: [ecm-net]
    depends_on: [prometheus]

volumes:
  sqlserver-data:
    driver: local
    driver_opts: { type: none, device: /data/ecm/sqlserver/data, o: bind }
  sqlserver-log:
    driver: local
    driver_opts: { type: none, device: /data/ecm/sqlserver/log, o: bind }
  sqlserver-backup:
    driver: local
    driver_opts: { type: none, device: /data/ecm/backup, o: bind }
  ecm-storage:
    driver: local
    driver_opts: { type: none, device: /data/ecm/storage, o: bind }
  ecm-logs:
    driver: local
    driver_opts: { type: none, device: /data/ecm/logs, o: bind }
  redis-data:
    driver: local
    driver_opts: { type: none, device: /data/ecm/redis, o: bind }
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  ecm-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.0.0/24
  ecm-public:
    driver: bridge
