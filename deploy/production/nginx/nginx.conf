worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Security ──────────────────────────────────────────────────────────────
    server_tokens off;
    more_clear_headers Server;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main_json '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"correlation_id":"$http_x_correlation_id",'
        '"user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log main_json;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1000;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name ecm.darah.gov.sa;
        return 301 https://$server_name$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ecm.darah.gov.sa;

        # SSL
        ssl_certificate     /etc/nginx/ssl/darah.crt;
        ssl_certificate_key /etc/nginx/ssl/darah.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # File upload limit (512MB)
        client_max_body_size 512m;
        client_body_timeout  300s;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;

        # Connection limit per IP
        limit_conn conn_limit 20;

        # ── Auth endpoints (strict rate limit) ────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://ecm-api;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Upload endpoints (separate limit) ─────────────────────────────────
        location ~* /api/v1/documents$ {
            limit_req zone=upload_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://ecm-api;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Webhook endpoints ─────────────────────────────────────────────────
        location /api/v1/webhooks/ {
            limit_req zone=api_limit burst=30;
            proxy_pass http://ecm-api;
            include /etc/nginx/proxy_params.conf;
        }

        # ── General API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://ecm-api;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Health check (no auth, no rate limit) ─────────────────────────────
        location /health {
            proxy_pass http://ecm-api;
            access_log off;
        }

        # ── Swagger (internal only) ───────────────────────────────────────────
        location /swagger {
            allow 172.20.0.0/24;
            deny all;
            proxy_pass http://ecm-api;
        }

        # ── Prometheus metrics (internal only) ────────────────────────────────
        location /metrics {
            allow 172.20.0.0/24;
            deny all;
            proxy_pass http://ecm-api;
        }
    }

    # ── Upstream (Blue-Green) ─────────────────────────────────────────────────
    upstream ecm-api {
        least_conn;
        server api-blue:8080 weight=10;
        # server api-green:8080 weight=10;  # Uncomment during switchover
        keepalive 32;
    }
}
